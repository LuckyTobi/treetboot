<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Leonardo's Tretboot</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:sans-serif; touch-action:none; }
  canvas { display:block; }
  #ui { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:14px 16px; pointer-events:none; z-index:10; }
  .badge { font-size:13px; font-weight:600; color:rgba(255,255,255,0.95); background:rgba(0,0,0,0.45); border-radius:20px; padding:6px 14px; border:1px solid rgba(255,255,255,0.15); transition:opacity 0.2s; }
  #bottom-ui { position:fixed; bottom:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:6px; padding-bottom:18px; pointer-events:none; z-index:10; }
  #speed-wrap { display:flex; align-items:center; gap:8px; }
  #speed-bar-bg { width:130px; height:7px; background:rgba(255,255,255,0.2); border-radius:4px; overflow:hidden; }
  #speed-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#f0c040,#e07020); border-radius:4px; transition:width 0.08s; }
  #hint { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:14px; color:rgba(255,255,255,0.9); background:rgba(0,0,0,0.6); padding:14px 20px; border-radius:16px; text-align:center; line-height:1.7; z-index:20; pointer-events:none; border:1px solid rgba(255,255,255,0.15); }
  #tap-left,#tap-right { position:fixed; top:0; bottom:70px; width:50%; z-index:5; }
  #tap-left{left:0;} #tap-right{right:0;}
  #compass { position:fixed; top:14px; right:16px; width:52px; height:52px; z-index:10; pointer-events:none; }
  #collision-flash { position:fixed; inset:0; background:rgba(255,60,60,0); pointer-events:none; z-index:30; transition:background 0.15s; }
  #gyro-btn { margin-top:10px; padding:8px 18px; font-size:14px; font-weight:600; background:rgba(255,200,40,0.9); color:#000; border:none; border-radius:20px; cursor:pointer; pointer-events:all; }
  #gyro-status { display:block; margin-top:5px; font-size:11px; opacity:0.75; }
  #gyro-debug { display:block; margin-top:3px; font-size:11px; color:rgba(255,255,100,0.9); font-family:monospace; }
</style>
</head>
<body>
<div id="tap-left"></div>
<div id="tap-right"></div>
<div id="collision-flash"></div>
<div id="ui">
  <span class="badge" id="badge-left">👈 Links</span>
  <span style="width:52px"></span>
</div>
<div id="bottom-ui">
  <div id="speed-wrap">
    <span class="badge" style="font-size:11px;">Geschwindigkeit</span>
    <div id="speed-bar-bg"><div id="speed-bar-fill"></div></div>
  </div>
  <span class="badge" id="badge-right" style="align-self:flex-end;margin-right:16px;">Rechts 👉</span>
</div>
<svg id="compass" viewBox="0 0 52 52">
  <circle cx="26" cy="26" r="25" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="26" y="13" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9" font-family="sans-serif">N</text>
  <line id="compass-needle" x1="26" y1="26" x2="26" y2="8" stroke="#f04040" stroke-width="2.5" stroke-linecap="round"/>
  <line id="compass-tail"   x1="26" y1="26" x2="26" y2="38" stroke="#aaa"    stroke-width="2"   stroke-linecap="round"/>
  <circle cx="26" cy="26" r="3" fill="#fff"/>
</svg>
<div id="hint">
  Wechselnd links/rechts tippen zum Starten<br>
  <button id="gyro-btn">📱 Neigung aktivieren</button>
  <span id="gyro-status"></span>
  <span id="gyro-debug"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87ceeb, 0.009);
scene.background = new THREE.Color(0x6ab4d8);

const camera = new THREE.PerspectiveCamera(58,window.innerWidth/window.innerHeight,0.1,600);
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── LIGHTS ──
scene.add(new THREE.AmbientLight(0xfff0d0,0.6));
const sun=new THREE.DirectionalLight(0xfff5e0,1.5);
sun.position.set(80,120,60); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-120; sun.shadow.camera.right=120;
sun.shadow.camera.top=120; sun.shadow.camera.bottom=-120;
sun.shadow.camera.far=500;
scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0xc0d8ff,0.3),{position:new THREE.Vector3(-50,30,-40)}));

// ── WATER ──
const waterGeo=new THREE.PlaneGeometry(800,800,110,110);
const waterMat=new THREE.MeshPhongMaterial({color:0x1a7ab8,specular:0x88ccff,shininess:90,transparent:true,opacity:0.87});
const water=new THREE.Mesh(waterGeo,waterMat);
water.rotation.x=-Math.PI/2; water.receiveShadow=true;
scene.add(water);
const wPos=waterGeo.attributes.position;

// ── MATERIALS ──
const M={
  walnut: new THREE.MeshPhongMaterial({color:0x6b3d0f,specular:0x1a0800,shininess:25}),
  walnutLt: new THREE.MeshPhongMaterial({color:0x9a5e1a,specular:0x220e00,shininess:20}),
  walnutDk: new THREE.MeshPhongMaterial({color:0x3d2005,specular:0x0a0500,shininess:15}),
  metal: new THREE.MeshPhongMaterial({color:0x7a7060,specular:0x554433,shininess:70}),
  metalDk: new THREE.MeshPhongMaterial({color:0x4a4438,specular:0x332211,shininess:50}),
  paddle: new THREE.MeshPhongMaterial({color:0x5c3008,specular:0x180800,shininess:18}),
  brass: new THREE.MeshPhongMaterial({color:0xc8901a,specular:0x664400,shininess:80}),
};
function box(w,h,d,m){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);}
function cyl(rt,rb,h,s,m){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m);}

// ══════════════════════════════════════════
//  BOAT
// ══════════════════════════════════════════
const boatGroup=new THREE.Group();
scene.add(boatGroup);

// ── WALNUT SHELL HULL ──
// Deep round-bottomed hull like a walnut half
(function(){
  // Build hull using lathe (revolution around Y axis = cross-section)
  // Profile: wide at top, narrow curved bottom
  const pts=[];
  // from bottom-center outward, going up
  pts.push(new THREE.Vector2(0.0,  -0.65));
  pts.push(new THREE.Vector2(0.35, -0.60));
  pts.push(new THREE.Vector2(0.72, -0.40));
  pts.push(new THREE.Vector2(1.02, -0.10));
  pts.push(new THREE.Vector2(1.12,  0.20));
  pts.push(new THREE.Vector2(1.10,  0.52));
  pts.push(new THREE.Vector2(1.05,  0.72));

  // We'll approximate hull as a squished sphere + rim
  // Outer hull shell
  const hullGeo=new THREE.SphereGeometry(1.1,18,12,0,Math.PI*2,0,Math.PI*0.62);
  const hull=new THREE.Mesh(hullGeo,M.walnut);
  hull.scale.set(1.0,0.8,1.5); // elongate fore-aft
  hull.position.y=-0.05;
  hull.castShadow=true; hull.receiveShadow=true;
  boatGroup.add(hull);

  // Inner bowl (darker, slightly smaller)
  const innerGeo=new THREE.SphereGeometry(0.98,16,10,0,Math.PI*2,0,Math.PI*0.58);
  const inner=new THREE.Mesh(innerGeo,M.walnutDk);
  inner.scale.set(1.0,0.78,1.48);
  inner.position.y=-0.02;
  boatGroup.add(inner);

  // Top rim ring
  const rimGeo=new THREE.TorusGeometry(1.08,0.07,8,28);
  const rim=new THREE.Mesh(rimGeo,M.walnutLt);
  rim.rotation.x=Math.PI/2;
  rim.scale.z=1.48;
  rim.position.y=0.52;
  rim.castShadow=true;
  boatGroup.add(rim);

  // Hull planks - visible wood grain strips
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI-Math.PI/2;
    const strip=box(0.04,0.06,2.6,i%2===0?M.walnut:M.walnutLt);
    strip.position.set(Math.cos(a)*0.95, Math.sin(a)*0.55+0.05, 0);
    strip.rotation.z=a;
    strip.scale.z=1.0;
    boatGroup.add(strip);
  }

  // Bow & stern pointed bits
  [-1,1].forEach(s=>{
    const tip=cyl(0.05,0.18,0.35,8,M.walnutDk);
    tip.rotation.x=Math.PI/2;
    tip.position.set(0,-0.18,s*1.55);
    tip.castShadow=true;
    boatGroup.add(tip);
  });
})();

// ── GEAR MECHANISM (visible inside hull) ──
const gearGroup=new THREE.Group();
boatGroup.add(gearGroup);

function makeGear(teeth,radius,thickness,mat){
  const g=new THREE.Group();
  // Main disc
  const disc=new THREE.Mesh(new THREE.CylinderGeometry(radius*0.82,radius*0.82,thickness,16),mat);
  g.add(disc);
  // Teeth
  for(let i=0;i<teeth;i++){
    const a=(i/teeth)*Math.PI*2;
    const tooth=box(radius*0.22,thickness*1.0,radius*0.18,mat);
    tooth.position.set(Math.cos(a)*radius*0.91,0,Math.sin(a)*radius*0.91);
    tooth.rotation.y=a;
    g.add(tooth);
  }
  // Hub
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(radius*0.18,radius*0.18,thickness*1.4,10),M.metalDk);
  g.add(hub);
  // Spokes
  for(let i=0;i<(teeth>10?6:4);i++){
    const a=(i/(teeth>10?6:4))*Math.PI*2;
    const spoke=box(radius*0.08,thickness*0.6,radius*0.65,M.walnutDk);
    spoke.position.set(Math.cos(a)*radius*0.4,0,Math.sin(a)*radius*0.4);
    spoke.rotation.y=a+Math.PI/2;
    g.add(spoke);
  }
  return g;
}

// Large central gear
const gearBig=makeGear(14,0.48,0.14,M.brass);
gearBig.rotation.x=Math.PI/2;
gearBig.position.set(0,0.1,0.1);
gearGroup.add(gearBig);

// Two smaller meshing gears (left & right of big)
const gearSmL=makeGear(8,0.27,0.12,M.metal);
gearSmL.rotation.x=Math.PI/2;
gearSmL.position.set(0,0.1,0.72);
gearGroup.add(gearSmL);

const gearSmR=makeGear(8,0.27,0.12,M.metal);
gearSmR.rotation.x=Math.PI/2;
gearSmR.position.set(0,0.1,-0.62);
gearGroup.add(gearSmR);

// Tiny pinion gears connecting to axle
const gearTinyL=makeGear(6,0.16,0.10,M.brass);
gearTinyL.rotation.x=Math.PI/2;
gearTinyL.position.set(0,0.1,0.94);
gearGroup.add(gearTinyL);

const gearTinyR=makeGear(6,0.16,0.10,M.brass);
gearTinyR.rotation.x=Math.PI/2;
gearTinyR.position.set(0,0.1,-0.85);
gearGroup.add(gearTinyR);

// Central drive axle
const axle=cyl(0.055,0.055,3.6,8,M.metalDk);
axle.rotation.z=Math.PI/2;
axle.position.set(0,0.1,0.1);
boatGroup.add(axle);

// ── PADDLE WHEELS ──
const wheelL=new THREE.Group();
const wheelR=new THREE.Group();

function buildWheel(grp,side){
  const R=1.3; // wheel radius
  const numBlades=7;

  // Outer rim
  const rim=new THREE.Mesh(new THREE.TorusGeometry(R,0.065,7,20),M.walnutDk);
  grp.add(rim);

  // Inner reinforcement ring
  const rim2=new THREE.Mesh(new THREE.TorusGeometry(R*0.58,0.045,6,16),M.walnut);
  grp.add(rim2);

  // Hub
  const hub=cyl(0.15,0.15,0.22,10,M.metalDk);
  hub.rotation.x=Math.PI/2;
  grp.add(hub);

  // Spokes
  for(let i=0;i<numBlades;i++){
    const a=(i/numBlades)*Math.PI*2;
    // spoke from hub to rim
    const spokeLen=R*0.88;
    const spk=box(0.06,spokeLen,0.055,M.walnut);
    spk.rotation.z=a;
    spk.position.set(Math.cos(a)*R*0.44,Math.sin(a)*R*0.44,0);
    grp.add(spk);

    // Paddle blade – wide trapezoid
    const bladeGeo=new THREE.BufferGeometry();
    const bw1=0.52, bw2=0.38, bh=0.42, bd=0.055;
    const bv=new Float32Array([
      -bw1/2,0,-bd/2,  bw1/2,0,-bd/2,  bw2/2,-bh,-bd/2,  -bw2/2,-bh,-bd/2,
      -bw1/2,0, bd/2,  bw1/2,0, bd/2,  bw2/2,-bh, bd/2,  -bw2/2,-bh, bd/2,
    ]);
    bladeGeo.setAttribute('position',new THREE.BufferAttribute(bv,3));
    bladeGeo.setIndex([0,1,2,0,2,3,4,6,5,4,7,6,0,4,5,0,5,1,3,2,6,3,6,7,0,3,7,0,7,4,1,5,6,1,6,2]);
    bladeGeo.computeVertexNormals();
    const blade=new THREE.Mesh(bladeGeo,M.paddle);
    blade.position.set(Math.cos(a)*R,Math.sin(a)*R,0);
    blade.rotation.z=a;
    blade.castShadow=true;
    grp.add(blade);
  }

  // Side cover disc (partial, decorative)
  const cover=new THREE.Mesh(new THREE.CylinderGeometry(R*0.35,R*0.35,0.08,12),M.walnutLt);
  cover.rotation.x=Math.PI/2;
  cover.position.z=side>0?0.1:-0.1;
  grp.add(cover);

  grp.rotation.y=Math.PI/2;
  grp.position.set(side*1.55,0.1,0.1);
  boatGroup.add(grp);
}

buildWheel(wheelL,-1);
buildWheel(wheelR, 1);

// Axle end caps
[-1,1].forEach(s=>{
  const cap=cyl(0.12,0.12,0.12,10,M.brass);
  cap.rotation.z=Math.PI/2;
  cap.position.set(s*1.82,0.1,0.1);
  boatGroup.add(cap);
});

// ── ISLANDS (20 total) ──
const islandData=[
  {x:28,z:-20,r:4.0},{x:-32,z:22,r:4.8},{x:52,z:32,r:3.2},
  {x:-22,z:-48,r:5.5},{x:65,z:-52,r:3.5},{x:-58,z:-32,r:4.2},
  {x:85,z:12,r:4.5},{x:-72,z:62,r:3.8},{x:12,z:72,r:5.0},
  {x:-12,z:-85,r:3.2},{x:42,z:85,r:2.8},{x:-85,z:-12,r:4.0},
  {x:35,z:-70,r:3.0},{x:-45,z:45,r:3.5},{x:100,z:-30,r:4.2},
  {x:-95,z:20,r:3.8},{x:20,z:110,r:5.2},{x:-30,z:-100,r:3.5},
  {x:75,z:75,r:4.0},{x:-75,z:-75,r:3.2},
];

islandData.forEach(d=>{
  const g=new THREE.Group();
  const sandM=new THREE.MeshPhongMaterial({color:0xf0d87a});
  const grassM=new THREE.MeshPhongMaterial({color:0x3a9a30});
  const trunkM=new THREE.MeshPhongMaterial({color:0x8B6010});
  const leafM=new THREE.MeshPhongMaterial({color:0x2d8020,side:THREE.DoubleSide});
  const rockM=new THREE.MeshPhongMaterial({color:0x887766});

  const beach=new THREE.Mesh(new THREE.CylinderGeometry(d.r,d.r*1.28,0.55,14),sandM);
  beach.castShadow=beach.receiveShadow=true; g.add(beach);
  const grass=new THREE.Mesh(new THREE.CylinderGeometry(d.r*0.72,d.r*0.94,0.4,14),grassM);
  grass.position.y=0.44; grass.castShadow=true; g.add(grass);
  const hill=new THREE.Mesh(new THREE.SphereGeometry(d.r*0.68,10,7),grassM);
  hill.position.y=0.6; hill.scale.y=0.44; hill.castShadow=true; g.add(hill);

  // Rocks cluster
  if(d.r>3.8){
    for(let ri=0;ri<3;ri++){
      const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(0.25+Math.random()*0.2),rockM);
      const ra=(ri/3)*Math.PI*2+Math.random()*0.5;
      rock.position.set(Math.cos(ra)*d.r*0.55,0.35,Math.sin(ra)*d.r*0.55);
      rock.rotation.set(Math.random(),Math.random(),Math.random());
      g.add(rock);
    }
  }

  // Palms
  const np=d.r>4.5?3:d.r>3.5?2:1;
  for(let p=0;p<np;p++){
    const pa=(p/np)*Math.PI*2;
    const pr=d.r*0.28;
    const px=Math.cos(pa)*pr, pz=Math.sin(pa)*pr;
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.13,2.5,7),trunkM);
    trunk.position.set(px,1.7,pz);
    trunk.rotation.z=(Math.random()-0.5)*0.28;
    trunk.castShadow=true; g.add(trunk);
    for(let i=0;i<6;i++){
      const la=(i/6)*Math.PI*2;
      const lf=new THREE.Mesh(new THREE.ConeGeometry(0.48,1.1,4),leafM);
      lf.position.set(px+Math.cos(la)*0.55,2.95,pz+Math.sin(la)*0.55);
      lf.rotation.z=Math.cos(la)*0.85; lf.rotation.x=Math.sin(la)*0.85;
      lf.castShadow=true; g.add(lf);
    }
  }
  g.position.set(d.x,0,d.z);
  scene.add(g);
});

// ── WAKE ──
const wakePool=[];
function spawnWake(x,z){
  if(wakePool.length>90){const o=wakePool.shift();scene.remove(o.mesh);}
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(0.1+Math.random()*0.13,4,4),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.4})
  );
  m.position.set(x+(Math.random()-0.5)*0.7,0.06,z+(Math.random()-0.5)*0.7);
  scene.add(m); wakePool.push({mesh:m,life:1.0});
}

// ── GAME STATE ──
const gs={x:0,z:0,angle:0,speed:0,maxSpeed:5.5,wheelRot:0,nextExpected:'left',combo:0,tilt:0,started:false,collisionCooldown:0};
const camPos=new THREE.Vector3(0,5,10);
const camTarget=new THREE.Vector3();

// ── GYRO ──
let gyroActive=false;
function listenGyro(){
  window.addEventListener('deviceorientation',e=>{
    if(e.gamma!==null){
      gyroActive=true;
      gs.tilt=Math.max(-1,Math.min(1,e.gamma/12));
      const dbg=document.getElementById('gyro-debug');
      if(dbg) dbg.textContent='γ='+Math.round(e.gamma)+'°  tilt='+gs.tilt.toFixed(2);
    }
  });
}
function activateGyro(){
  const btn=document.getElementById('gyro-btn');
  const status=document.getElementById('gyro-status');
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(r=>{
        if(r==='granted'){listenGyro();btn.textContent='✅ Neigung aktiv';btn.style.background='rgba(60,200,80,0.9)';status.textContent='Handy neigen zum Lenken';}
        else{btn.textContent='❌ Zugriff verweigert';status.textContent='Einstellungen→Safari→Bewegung aktivieren';}
      }).catch(()=>{btn.textContent='❌ Fehler';});
  } else {
    listenGyro();
    btn.textContent='✅ Neigung aktiv';
    btn.style.background='rgba(60,200,80,0.9)';
    status.textContent='Handy neigen zum Lenken';
  }
}
document.getElementById('gyro-btn').addEventListener('click',activateGyro);
document.getElementById('gyro-btn').addEventListener('touchend',e=>{e.preventDefault();activateGyro();});

// ── TAP ──
function handleTap(side){
  if(!gs.started){gs.started=true;document.getElementById('hint').style.display='none';}
  if(side===gs.nextExpected){
    gs.combo++;
    gs.speed=Math.min(gs.maxSpeed,gs.speed+0.44+gs.combo*0.05);
    gs.nextExpected=side==='left'?'right':'left';
  } else {gs.combo=0;gs.speed=Math.max(0,gs.speed-0.4);}
}
document.getElementById('tap-left').addEventListener('touchstart',e=>{e.preventDefault();handleTap('left');},{passive:false});
document.getElementById('tap-right').addEventListener('touchstart',e=>{e.preventDefault();handleTap('right');},{passive:false});
document.getElementById('tap-left').addEventListener('mousedown',()=>handleTap('left'));
document.getElementById('tap-right').addEventListener('mousedown',()=>handleTap('right'));

// ── COLLISION ──
function checkCollisions(){
  if(gs.collisionCooldown>0) return;
  for(const d of islandData){
    const dx=gs.x-d.x,dz=gs.z-d.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<d.r*1.1+1.3){
      gs.speed=-1.5;gs.combo=0;
      gs.x+=(dx/dist)*2;gs.z+=(dz/dist)*2;
      gs.collisionCooldown=45;
      const fl=document.getElementById('collision-flash');
      fl.style.background='rgba(255,60,60,0.45)';
      setTimeout(()=>{fl.style.background='rgba(255,60,60,0)';},200);
      return;
    }
  }
}

// ── LOOP ──
let lastT=0,wakeT=0;
function animate(t){
  requestAnimationFrame(animate);
  const dt=Math.min((t-lastT)/16.67,3);lastT=t;
  const time=t*0.001;

  // Water waves
  for(let i=0;i<wPos.count;i++){
    const wx=wPos.getX(i),wz=wPos.getZ(i);
    wPos.setZ(i,Math.sin(wx*0.25+time)*0.22+Math.cos(wz*0.20+time*1.1)*0.14);
  }
  wPos.needsUpdate=true; waterGeo.computeVertexNormals();

  if(gs.collisionCooldown>0) gs.collisionCooldown-=dt;
  gs.speed*=Math.pow(0.982,dt);
  if(Math.abs(gs.speed)<0.005){gs.speed=0;gs.combo=0;}
  if(Math.abs(gs.speed)>0.05) gs.angle+=gs.tilt*0.06*dt*(0.4+gs.speed/gs.maxSpeed);

  gs.x+=Math.sin(gs.angle)*gs.speed*dt*0.17;
  gs.z+=Math.cos(gs.angle)*gs.speed*dt*0.17;
  gs.wheelRot+=gs.speed*0.09*dt;

  // Spin wheels
  wheelL.rotation.x=gs.wheelRot;
  wheelR.rotation.x=gs.wheelRot;

  // Spin gears (counter-rotating pairs)
  gearBig.rotation.z  = gs.wheelRot*0.5;
  gearSmL.rotation.z  = -gs.wheelRot*0.88;
  gearSmR.rotation.z  = -gs.wheelRot*0.88;
  gearTinyL.rotation.z = gs.wheelRot*1.5;
  gearTinyR.rotation.z = gs.wheelRot*1.5;

  checkCollisions();

  boatGroup.position.set(gs.x,0,gs.z);
  boatGroup.rotation.y=gs.angle;
  boatGroup.rotation.z=Math.sin(time*1.2)*0.022;
  boatGroup.rotation.x=Math.cos(time*0.9)*0.016;
  boatGroup.position.y=Math.sin(time*1.4)*0.07;

  // Wake
  if(gs.speed>0.5){wakeT+=dt;if(wakeT>2.2){wakeT=0;spawnWake(gs.x,gs.z);}}
  for(let i=wakePool.length-1;i>=0;i--){
    const p=wakePool[i];p.life-=0.010*dt;
    p.mesh.material.opacity=p.life*0.4;
    p.mesh.scale.setScalar(1+(1-p.life)*2.2);
    if(p.life<=0){scene.remove(p.mesh);wakePool.splice(i,1);}
  }

  // Camera
  const bx=gs.x-Math.sin(gs.angle)*9.5;
  const bz=gs.z-Math.cos(gs.angle)*9.5;
  camPos.lerp(new THREE.Vector3(bx,5.2,bz),0.065);
  camera.position.copy(camPos);
  camTarget.lerp(new THREE.Vector3(gs.x,0.6,gs.z),0.1);
  camera.lookAt(camTarget);

  // Compass
  document.getElementById('compass-needle').setAttribute('x2',26+Math.sin(gs.angle)*18);
  document.getElementById('compass-needle').setAttribute('y2',26-Math.cos(gs.angle)*18);
  document.getElementById('compass-tail').setAttribute('x2',26-Math.sin(gs.angle)*12);
  document.getElementById('compass-tail').setAttribute('y2',26+Math.cos(gs.angle)*12);

  document.getElementById('speed-bar-fill').style.width=Math.round(Math.max(0,gs.speed/gs.maxSpeed)*100)+'%';
  document.getElementById('badge-left').style.opacity=gs.nextExpected==='left'?'1':'0.3';
  document.getElementById('badge-right').style.opacity=gs.nextExpected==='right'?'1':'0.3';

  renderer.render(scene,camera);
}

camera.position.set(0,5,10); camera.lookAt(0,0.5,0);
requestAnimationFrame(animate);
</script>
</body>
</html>
